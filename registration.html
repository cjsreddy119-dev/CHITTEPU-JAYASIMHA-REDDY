<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <!-- <link rel="stylesheet" href="registration.css"> -->





    <style>
        :root {
    --official-blue: #002e5d; 
    --border-gray: #bdc3c7;
    --bg-light: #f4f7f8;
    --text-dark: #2c3e50;
}

body {
    font-family: Arial, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-dark);
    line-height: 1.6;
    margin: 0;
    padding: 50px 20px;
}

.form-wrapper {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #ddd;
    box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

.form-header {
    background-color: var(--official-blue);
    color: #fff;
    padding: 25px;
    text-align: center;
}

.form-header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 1px;
}

.form-header p {
    margin: 5px 0 0;
    font-size: 14px;
    opacity: 0.9;
}

form {
    padding: 40px;
}

.form-section {
    margin-bottom: 35px;
}

.section-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--official-blue);
    border-bottom: 2px solid var(--official-blue);
    padding-bottom: 5px;
    margin-bottom: 20px;
}

.input-row {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

.input-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.flex-3 { flex: 3; }
.flex-1 { flex: 1; }

label {
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #555;
}

input, textarea {
    padding: 10px;
    border: 1px solid var(--border-gray);
    font-size: 14px;
    border-radius: 2px;
}

input:focus, textarea:focus {
    outline: 2px solid #3498db;
    border-color: transparent;
}

.declaration {
    background: #fdfdfd;
    padding: 15px;
    border: 1px dashed var(--border-gray);
    margin-bottom: 30px;
    font-size: 13px;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.btn {
    padding: 12px 30px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    font-size: 14px;
}

.btn-primary {
    background-color: var(--official-blue);
    color: #fff;
    border: none;
}

.btn-primary:hover {
    background-color: #001f3f;
}

.btn-secondary {
    background-color: #fff;
    color: #555;
    border: 1px solid var(--border-gray);
}


    </style>
</head>
<body>

<div class="form-wrapper">
    <header class="form-header">
        <div class="header-content">
            <h1> STUDENT REGISTRATION PORTAL</h1>
            <!-- <p>Academic Year 2025-2026</p> -->
        </div>
    </header>

    <form action="#">
        <div class="form-section">
            <h2 class="section-title">1. PERSONAL INFORMATION</h2>
            
            <div class="input-row">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required   placeholder="As per Aadhar Card">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" required  placeholder="+91 9999999999">
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required  placeholder="jaya@gmail.com">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div class="input-group">
                    <label for="address">Correspondence Address</label>
                    <textarea id="address" name="address" rows="1"></textarea>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title">2. ACADEMIC QUALIFICATIONS</h2>
            
            <div class="input-row academic-grid">
                <div class="input-group flex-3">
                    <label>School Name (10th Standard)</label>
                    <input type="text" name="school_name">
                </div>
                <div class="input-group flex-1">
                    <label>Aggregate %</label>
                    <input type="number" step="0.01" name="school_pct">
                </div>
            </div>

            <div class="input-row academic-grid">
                <div class="input-group flex-3">
                    <label>Junior College Name (Inter/12th)</label>
                    <input type="text" name="inter_name">
                </div>
                <div class="input-group flex-1">
                    <label>Aggregate %</label>
                    <input type="number" step="0.01" name="inter_pct">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>B.Tech Branch</label>
                    <input type="text" placeholder="e.g. Computer Science and Engineering">
                </div>
                <div class="input-group">
                    <label>Year of Passing</label>
                    <input type="number" min="2000" max="2030">
                </div>
                <div class="input-group">
                    <label>Final CGPA</label>
                    <input type="number" step="0.01">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="section-title">3. ADDITIONAL INFORMATION</h2>
            <div class="input-group">
                <label for="comments">Remarks / Comments</label>
                <textarea id="comments" name="comments" rows="3"></textarea>
            </div>
        </div>

        <div class="declaration">
            <label>
                <input type="checkbox" required> I hereby declare that the details furnished above are true and correct to the best of my knowledge.
            </label>
        </div>

        <div class="form-actions">
            <button type="reset" class="btn btn-secondary">Clear Form</button>
            <button type="submit" class="btn btn-primary">Submit Application</button>
        </div>
    </form>
</div>

</body>
</html>
